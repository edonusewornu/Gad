<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Love Calculator ❤️</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }

    body {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      align-items:center;
      background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff512f, #dd2476);
      background-size:400% 400%;
      animation: gradientBG 12s ease infinite;
      color:white;
    }

    @keyframes gradientBG {
      0% { background-position:0% 50%; }
      50% { background-position:100% 50%; }
      100% { background-position:0% 50%; }
    }

    .container {
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-top:40px;
    }

    .card {
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.1);
      border-radius:20px;
      padding:40px;
      width:300px;
      text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      border:1px solid rgba(255,255,255,0.2);
    }

    .card h1 {
      margin-bottom:20px;
      text-shadow:0 0 10px rgba(255,100,150,0.8);
    }

    input {
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:10px;
      border:none;
      background:rgba(255,255,255,0.2);
      color:white;
    }

    button {
      margin-top:15px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background: linear-gradient(45deg, #ff4b6e, #ff758c);
      color:white;
      cursor:pointer;
    }

    .contact {
      margin-top:25px;
    }

    footer {
      margin-bottom:10px;
      font-size:14px;
      opacity:0.8;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>❤️ Love Calculator</h1>
    <input type="text" id="yourName" placeholder="Your Name">
    <input type="text" id="crushName" placeholder="Crush Name">
    <button onclick="calculateLove()">Calculate 💘</button>
  </div>

  <div class="contact">
    <a href="https://www.instagram.com/gadmichael7" target="_blank" style="color:white;">
      <i class="fab fa-instagram"></i> @gadmichael7
    </a>
  </div>
</div>

<footer>©2026 built for lovers - Gadmichael ❤️</footer>

<script>
function calculateLove(){
  const yourName = document.getElementById("yourName").value;
  const crushName = document.getElementById("crushName").value;

  if(!yourName || !crushName){
    alert("Enter both names!");
    return;
  }

  // Go to prank result page (relative link)
  window.location.href = "result.html?y=" + encodeURIComponent(yourName) + "&c=" + encodeURIComponent(crushName);
}
</script>

</body>
</html>
