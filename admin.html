<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Dashboard ❤️</title>
<style>
body { font-family:Arial; background:#111; color:white; padding:20px; }
h1 { text-align:center; }
input { padding:8px; margin:10px 0; width:200px; border-radius:5px; border:none; }
button { padding:8px 15px; border:none; border-radius:5px; cursor:pointer; }
.card { background:#222; padding:10px; margin:5px 0; border-radius:8px; }
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<h1>📊 Love Entries Dashboard</h1>
<input type="password" id="password" placeholder="Enter password">
<button onclick="login()">Login</button>

<div id="dashboard" style="display:none;">
  <h2>Entries:</h2>
  <div id="entries"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-jCBblDitpXZehwo65_vGfCgkpg95fBQ",
  authDomain: "love-calculator-a75e4.firebaseapp.com",
  projectId: "love-calculator-a75e4",
  storageBucket: "love-calculator-a75e4.firebasestorage.app",
  messagingSenderId: "720011549939",
  appId: "1:720011549939:web:7b031c2348e39b067bab86",
  measurementId: "G-RHJFBKJGNV"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_PASSWORD = "1234";

function login() {
  const pw = document.getElementById("password").value;
  if(pw !== ADMIN_PASSWORD){
    alert("Wrong password!");
    return;
  }

  document.getElementById("dashboard").style.display = "block";
  document.getElementById("password").style.display = "none";
  document.querySelector("button").style.display = "none";

  db.collection("loveEntries").orderBy("time","desc").onSnapshot(snapshot=>{
    const container = document.getElementById("entries");
    container.innerHTML = "";
    snapshot.forEach(doc=>{
      const data = doc.data();
      const div = document.createElement("div");
      div.className="card";
      div.innerHTML = `<b>${data.yourName}</b> ❤️ <b>${data.crushName}</b><br><small>${data.time?.toDate?.()?.toLocaleString() || ""}</small>`;
      container.appendChild(div);
    });
  });
}
</script>
</body>
</html>
